<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindMate AI | Test Suite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <style>
        .test-pass { color: var(--bs-success); }
        .test-fail { color: var(--bs-danger); }
        .test-suite { border-left: 4px solid var(--accent-primary); margin-bottom: 2rem; }
    </style>
</head>
<body class="bg-dark text-light p-5">
    <div class="container max-w-4xl mx-auto">
        <header class="d-flex justify-content-between align-items-center mb-5 pb-3 border-bottom border-secondary">
            <div>
                <h1 class="h2"><i class="fa-solid fa-vial-circle-check text-primary me-2"></i>MindMate AI Test Runner</h1>
                <p class="text-secondary">Vanilla JS testing framework for static deployment</p>
            </div>
            <div class="text-end">
                <div class="h4 mb-0" id="overall-status">Running Tests...</div>
                <div class="small text-secondary" id="test-counts">Passed: 0 | Failed: 0</div>
            </div>
        </header>

        <div id="test-results" class="glass-card p-4"></div>
    </div>

    <!-- The Testing Framework and Test Execution -->
    <script type="module">
        import { runAllTests } from './runner.js';
        
        document.addEventListener('DOMContentLoaded', async () => {
            const resultsContainer = document.getElementById('test-results');
            let passedCount = 0;
            let failedCount = 0;

            const renderResult = (suiteName, results) => {
                const suiteDiv = document.createElement('div');
                suiteDiv.className = 'test-suite ps-3';
                
                const title = document.createElement('h3');
                title.className = 'h5 mb-3';
                title.textContent = suiteName;
                suiteDiv.appendChild(title);

                const ul = document.createElement('ul');
                ul.className = 'list-group list-group-flush bg-transparent';

                results.forEach(res => {
                    const li = document.createElement('li');
                    li.className = 'list-group-item bg-transparent text-light border-secondary border-opacity-25 d-flex align-items-center gap-3';
                    
                    if (res.passed) {
                        passedCount++;
                        li.innerHTML = `<i class="fa-solid fa-circle-check test-pass fs-5"></i> <span>${res.name}</span>`;
                    } else {
                        failedCount++;
                        li.innerHTML = `
                            <i class="fa-solid fa-circle-xmark test-fail fs-5"></i> 
                            <div>
                                <div class="fw-bold">${res.name}</div>
                                <div class="small text-danger font-monospace mt-1">${res.error}</div>
                            </div>
                        `;
                    }
                    ul.appendChild(li);
                });

                suiteDiv.appendChild(ul);
                resultsContainer.appendChild(suiteDiv);
            };

            // Execute all tests
            const allResults = await runAllTests();
            
            // Render results
            for (const [suiteName, results] of Object.entries(allResults)) {
                renderResult(suiteName, results);
            }

            // Update Header
            document.getElementById('test-counts').textContent = `Passed: ${passedCount} | Failed: ${failedCount}`;
            const statusEl = document.getElementById('overall-status');
            if (failedCount === 0) {
                statusEl.textContent = "All Tests Passed! 🎉";
                statusEl.className = "h4 mb-0 text-success";
            } else {
                statusEl.textContent = "Tests Failed ⚠️";
                statusEl.className = "h4 mb-0 text-danger";
            }
        });
    </script>
</body>
</html>
